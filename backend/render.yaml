services:
  - type: web
    name: omnisense-backend
    runtime: python-3.10
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        scope: runtime
      - key: ALLOWED_ORIGIN
        scope: runtime
      - key: SMTP_HOST
        scope: runtime
      - key: SMTP_PORT
        scope: runtime
      - key: SMTP_USERNAME
        scope: runtime
      - key: SMTP_PASSWORD
        scope: runtime
      - key: SMTP_USE_TLS
        scope: runtime
      - key: SMTP_FROM_EMAIL
        value: noreply@omnisense.pk
      - key: NOTIFICATION_EMAIL
        scope: runtime
